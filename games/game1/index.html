<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            touch-action: none;
            overscroll-behavior: none;
            padding: 10px;
        }
        .game-container {
            background: #111128;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.15);
            border: 1px solid rgba(0, 150, 255, 0.2);
        }
        .info {
            display: flex;
            justify-content: space-between;
            color: #88ddff;
            font-size: 18px;
            padding: 0 4px 16px 4px;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.3);
            letter-spacing: 1px;
        }
        .info span {
            color: #fff;
            font-weight: bold;
            font-size: 22px;
        }
        .canvas-wrapper {
            background: #0a0a1a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 10 / 20;
            background: #0a0a1a;
            touch-action: none;
        }
        .controls {
            display: flex;
            gap: 8px;
            padding-top: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            background: #1a1a3a;
            border: 1px solid rgba(0, 150, 255, 0.3);
            color: #88ddff;
            font-size: 24px;
            padding: 10px 20px;
            min-width: 60px;
            border-radius: 8px;
            cursor: pointer;
            touch-action: none;
            transition: all 0.05s;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 150, 255, 0.3);
        }
        .btn:active {
            background: #2a2a5a;
            transform: scale(0.95);
            border-color: #88ddff;
        }
        @media (max-width: 500px) {
            .game-container { padding: 12px; }
            .info { font-size: 14px; }
            .info span { font-size: 18px; }
            .btn { font-size: 18px; padding: 8px 14px; min-width: 48px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info">
        <div>SCORE <span id="scoreDisplay">0</span></div>
        <div>LEVEL <span id="levelDisplay">0</span></div>
        <div>LINES <span id="linesDisplay">0</span></div>
    </div>
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="300" height="600"></canvas>
    </div>
    <div class="controls">
        <button class="btn" id="leftBtn">◄</button>
        <button class="btn" id="rightBtn">►</button>
        <button class="btn" id="rotateBtn">↻</button>
        <button class="btn" id="dropBtn">▼▼</button>
    </div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const levelSpan = document.getElementById('levelDisplay');
        const linesSpan = document.getElementById('linesDisplay');

        const COLS = 10;
        const ROWS = 20;
        const SIZE = 30;

        const COLORS = [
            null,
            '#00f0f0',
            '#f0f000',
            '#a000f0',
            '#00f000',
            '#f00000',
            '#f0a000',
            '#0000f0'
        ];

        const SHAPES = [
            { matrix: [[1,1,1,1]], color: 1 },
            { matrix: [[1,1],[1,1]], color: 2 },
            { matrix: [[0,1,0],[1,1,1]], color: 3 },
            { matrix: [[0,1,1],[1,1,0]], color: 4 },
            { matrix: [[1,1,0],[0,1,1]], color: 5 },
            { matrix: [[1,0,0],[1,1,1]], color: 6 },
            { matrix: [[0,0,1],[1,1,1]], color: 7 }
        ];

        let board = [];
        let currentPiece = null;
        let score = 0;
        let level = 0;
        let lines = 0;
        let gameOver = false;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let animationId = null;

        function createBoard() {
            board = [];
            for (let row = 0; row < ROWS; row++) {
                board.push(new Array(COLS).fill(0));
            }
        }

        function randomPiece() {
            const idx = Math.floor(Math.random() * SHAPES.length);
            const shape = SHAPES[idx];
            return {
                matrix: shape.matrix.map(row => [...row]),
                color: shape.color,
                x: Math.floor((COLS - shape.matrix[0].length) / 2),
                y: 0
            };
        }

        function spawnPiece() {
            const piece = randomPiece();
            if (collision(piece.matrix, piece.x, piece.y)) {
                gameOver = true;
                return false;
            }
            currentPiece = piece;
            return true;
        }

        function collision(matrix, offsetX, offsetY) {
            for (let row = 0; row < matrix.length; row++) {
                for (let col = 0; col < matrix[0].length; col++) {
                    if (matrix[row][col] !== 0) {
                        const x = offsetX + col;
                        const y = offsetY + row;
                        if (x < 0 || x >= COLS || y >= ROWS || y < 0) return true;
                        if (y >= 0 && board[y][x] !== 0) return true;
                    }
                }
            }
            return false;
        }

        function mergePiece() {
            if (!currentPiece) return;
            const { matrix, x, y, color } = currentPiece;
            for (let row = 0; row < matrix.length; row++) {
                for (let col = 0; col < matrix[0].length; col++) {
                    if (matrix[row][col] !== 0) {
                        const boardY = y + row;
                        const boardX = x + col;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = color;
                        }
                    }
                }
            }
        }

        function clearLines() {
            let cleared = 0;
            for (let row = ROWS - 1; row >= 0; ) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] === 0) {
                        full = false;
                        break;
                    }
                }
                if (full) {
                    board.splice(row, 1);
                    board.unshift(new Array(COLS).fill(0));
                    cleared++;
                } else {
                    row--;
                }
            }
            if (cleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[Math.min(cleared, 4)];
                lines += cleared;
                level = Math.floor(lines / 10);
                dropInterval = Math.max(80, 1000 - level * 80);
                updateUI();
            }
        }

        function lockPiece() {
            if (!currentPiece) return;
            mergePiece();
            clearLines();
            const success = spawnPiece();
            if (!success) {
                gameOver = true;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                render();
            }
            dropCounter = 0;
            updateUI();
        }

        function movePiece(dx, dy) {
            if (!currentPiece || gameOver) return false;
            const newX = currentPiece.x + dx;
            const newY = currentPiece.y + dy;
            if (!collision(currentPiece.matrix, newX, newY)) {
                currentPiece.x = newX;
                currentPiece.y = newY;
                render();
                return true;
            }
            if (dy === 1) {
                lockPiece();
                render();
            }
            return false;
        }

        function rotatePiece() {
            if (!currentPiece || gameOver) return;
            const matrix = currentPiece.matrix;
            const rotated = matrix[0].map((_, idx) => matrix.map(row => row[idx]).reverse());
            const oldX = currentPiece.x;
            const oldY = currentPiece.y;
            
            if (!collision(rotated, oldX, oldY)) {
                currentPiece.matrix = rotated;
                render();
                return;
            }
            
            const kicks = [-1, 1, -2, 2];
            for (let kick of kicks) {
                if (!collision(rotated, oldX + kick, oldY)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x = oldX + kick;
                    render();
                    return;
                }
                if (!collision(rotated, oldX, oldY - 1)) {
                    currentPiece.matrix = rotated;
                    currentPiece.y = oldY - 1;
                    render();
                    return;
                }
                if (!collision(rotated, oldX + kick, oldY - 1)) {
                    currentPiece.matrix = rotated;
                    currentPiece.x = oldX + kick;
                    currentPiece.y = oldY - 1;
                    render();
                    return;
                }
            }
        }

        function hardDrop() {
            if (!currentPiece || gameOver) return;
            while (!collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            }
            lockPiece();
            render();
        }

        function updateUI() {
            scoreSpan.textContent = score;
            levelSpan.textContent = level;
            linesSpan.textContent = lines;
        }

        function render() {
            ctx.clearRect(0, 0, 300, 600);
            
            // Board
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const color = board[row][col];
                    if (color !== 0) {
                        ctx.fillStyle = COLORS[color];
                        ctx.shadowColor = COLORS[color];
                        ctx.shadowBlur = 12;
                        ctx.fillRect(col * SIZE, row * SIZE, SIZE - 0.5, SIZE - 0.5);
                    } else {
                        ctx.fillStyle = '#15152a';
                        ctx.shadowBlur = 0;
                        ctx.fillRect(col * SIZE, row * SIZE, SIZE - 0.5, SIZE - 0.5);
                    }
                }
            }
            
            // Current piece
            if (currentPiece && !gameOver) {
                const { matrix, x, y, color } = currentPiece;
                ctx.shadowColor = COLORS[color];
                ctx.shadowBlur = 18;
                for (let row = 0; row < matrix.length; row++) {
                    for (let col = 0; col < matrix[0].length; col++) {
                        if (matrix[row][col] !== 0) {
                            ctx.fillStyle = COLORS[color];
                            ctx.fillRect((x + col) * SIZE, (y + row) * SIZE, SIZE - 0.5, SIZE - 0.5);
                        }
                    }
                }
            }
            ctx.shadowBlur = 0;
            
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 300, 600);
                ctx.fillStyle = '#ff4466';
                ctx.font = 'bold 36px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#ff4466';
                ctx.shadowBlur = 30;
                ctx.fillText('GAME OVER', 150, 280);
                ctx.shadowBlur = 0;
            }
        }

        function gameLoop(time) {
            if (!gameOver) {
                const delta = time - lastTime;
                lastTime = time;
                dropCounter += delta;
                if (dropCounter >= dropInterval) {
                    dropCounter = 0;
                    if (!collision(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
                        currentPiece.y++;
                        render();
                    } else {
                        lockPiece();
                        render();
                    }
                }
                render();
                animationId = requestAnimationFrame(gameLoop);
            } else {
                render();
            }
        }

        function initGame() {
            createBoard();
            score = 0;
            level = 0;
            lines = 0;
            gameOver = false;
            dropCounter = 0;
            dropInterval = 1000;
            updateUI();
            spawnPiece();
            render();
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            lastTime = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
            if (gameOver) return;
            switch(e.key) {
                case 'ArrowLeft': movePiece(-1, 0); break;
                case 'ArrowRight': movePiece(1, 0); break;
                case 'ArrowDown': movePiece(0, 1); break;
                case 'ArrowUp': rotatePiece(); break;
                case ' ': hardDrop(); break;
            }
        });

        document.getElementById('leftBtn').addEventListener('click', () => movePiece(-1, 0));
        document.getElementById('rightBtn').addEventListener('click', () => movePiece(1, 0));
        document.getElementById('rotateBtn').addEventListener('click', rotatePiece);
        document.getElementById('dropBtn').addEventListener('click', hardDrop);

        // Touch
        let touchStartX = 0, touchStartY = 0;
        let isTouching = false;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            touchStartX = t.clientX;
            touchStartY = t.clientY;
            isTouching = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isTouching || gameOver || !e.touches.length) return;
            const t = e.touches[0];
            const dx = t.clientX - touchStartX;
            const dy = t.clientY - touchStartY;
            if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    movePiece(dx > 0 ? 1 : -1, 0);
                } else {
                    if (dy > 15) movePiece(0, 1);
                }
                touchStartX = t.clientX;
                touchStartY = t.clientY;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (isTouching && !gameOver) {
                rotatePiece();
            }
            isTouching = false;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.game-container')) e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('click', () => {
            if (gameOver) initGame();
        });

        initGame();
    })();
</script>
</body>
</html>
