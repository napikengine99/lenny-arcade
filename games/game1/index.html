<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>neon tetris</title>

<style>
  body {
    margin: 0;
    background: radial-gradient(circle at center, #0b0f1a, #05060a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
    color: white;
  }

  canvas {
    background: rgba(10, 12, 20, 0.9);
    border: 1px solid rgba(120, 180, 255, 0.15);
    box-shadow:
      0 0 20px rgba(80, 140, 255, 0.15),
      0 0 60px rgba(80, 140, 255, 0.08);
    border-radius: 10px;
  }

  .ui {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>

<body>
<div class="ui">neon tetris</div>
<canvas id="tetris" width="320" height="640"></canvas>

<script>
const canvas = document.getElementById("tetris");
const ctx = canvas.getContext("2d");

ctx.scale(20, 20);

function createMatrix(w, h) {
  const matrix = [];
  while (h--) matrix.push(new Array(w).fill(0));
  return matrix;
}

function createPiece(type) {
  if (type === "T") return [
    [0,0,0],
    [1,1,1],
    [0,1,0],
  ];
  if (type === "O") return [
    [2,2],
    [2,2],
  ];
  if (type === "L") return [
    [0,3,0],
    [0,3,0],
    [0,3,3],
  ];
  if (type === "J") return [
    [0,4,0],
    [0,4,0],
    [4,4,0],
  ];
  if (type === "I") return [
    [0,5,0,0],
    [0,5,0,0],
    [0,5,0,0],
    [0,5,0,0],
  ];
  if (type === "S") return [
    [0,6,6],
    [6,6,0],
    [0,0,0],
  ];
  if (type === "Z") return [
    [7,7,0],
    [0,7,7],
    [0,0,0],
  ];
}

function drawMatrix(matrix, offset) {
  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        ctx.fillStyle = colors[value];
        ctx.shadowColor = colors[value];
        ctx.shadowBlur = 12;

        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);

        ctx.shadowBlur = 0;
      }
    });
  });
}

function collide(arena, player) {
  const m = player.matrix;
  const o = player.pos;

  for (let y = 0; y < m.length; ++y) {
    for (let x = 0; x < m[y].length; ++x) {
      if (
        m[y][x] !== 0 &&
        (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0
      ) {
        return true;
      }
    }
  }
  return false;
}

function merge(arena, player) {
  player.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        arena[y + player.pos.y][x + player.pos.x] = value;
      }
    });
  });
}

function arenaSweep() {
  outer: for (let y = arena.length - 1; y >= 0; --y) {
    for (let x = 0; x < arena[y].length; ++x) {
      if (arena[y][x] === 0) continue outer;
    }

    const row = arena.splice(y, 1)[0].fill(0);
    arena.unshift(row);
    y++;
  }
}

function rotate(matrix) {
  for (let y = 0; y < matrix.length; ++y) {
    for (let x = 0; x < y; ++x) {
      [matrix[x][y], matrix[y][x]] =
      [matrix[y][x], matrix[x][y]];
    }
  }
  matrix.forEach(row => row.reverse());
}

function playerRotate(dir) {
  const pos = player.pos.x;
  let offset = 1;
  rotate(player.matrix);

  while (collide(arena, player)) {
    player.pos.x += offset;
    offset = -(offset + (offset > 0 ? 1 : -1));
    if (offset > player.matrix[0].length) {
      rotate(player.matrix);
      player.pos.x = pos;
      return;
    }
  }
}

function playerDrop() {
  player.pos.y++;
  if (collide(arena, player)) {
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
  }
  dropCounter = 0;
}

function playerMove(dir) {
  player.pos.x += dir;
  if (collide(arena, player)) {
    player.pos.x -= dir;
  }
}

function playerReset() {
  const pieces = "TJLOSZI";
  player.matrix = createPiece(pieces[Math.floor(Math.random() * pieces.length)]);
  player.pos.y = 0;
  player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

  if (collide(arena, player)) {
    arena.forEach(row => row.fill(0));
  }
}

let dropCounter = 0;
let dropInterval = 500;
let lastTime = 0;

function update(time = 0) {
  const delta = time - lastTime;
  lastTime = time;

  dropCounter += delta;
  if (dropCounter > dropInterval) {
    playerDrop();
  }

  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.fillStyle = "#05060a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMatrix(arena, {x:0, y:0});
  drawMatrix(player.matrix, player.pos);
}

document.addEventListener("keydown", event => {
  if (event.key === "ArrowLeft") playerMove(-1);
  else if (event.key === "ArrowRight") playerMove(1);
  else if (event.key === "ArrowDown") playerDrop();
  else if (event.key === "ArrowUp") playerRotate(1);
});

const colors = [
  null,
  "#ff4fd8",
  "#4dfcff",
  "#ffd24d",
  "#7c4dff",
  "#4dff88",
  "#ff4d4d",
  "#4da3ff",
];

const arena = createMatrix(12, 20);

const player = {
  pos: {x:0, y:0},
  matrix: null,
};

playerReset();
update();
</script>
</body>
</html>
